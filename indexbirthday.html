<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Widget</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:transparent;
padding:12px;

}

.widget{

max-width:430px;

margin:auto;

padding:18px;

border-radius:24px;

background:linear-gradient(135deg,#FFF7E8,#FFF3DD);

box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.header{

display:flex;

align-items:center;

gap:12px;

margin-bottom:18px;

}

.icon{

width:42px;

height:42px;

border-radius:50%;

background:#F9A825;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

color:white;

}

.title{

font-size:26px;

font-weight:700;

color:#333;

}

.card{

background:white;

border-radius:18px;

padding:14px;

margin-bottom:14px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 3px 12px rgba(0,0,0,.05);

transition:.25s;

}

.card:hover{

transform:translateY(-3px);

}

.left{

display:flex;

align-items:center;

}

.date{

width:55px;

text-align:center;

margin-right:14px;

}

.day{

font-size:36px;

font-weight:700;

line-height:1;

color:#F57C00;

}

.month{

font-size:13px;

font-weight:700;

color:#999;

}

.avatar{

width:58px;

height:58px;

border-radius:50%;

object-fit:cover;

margin-right:14px;

background:#E3F2FD;

}

.info h3{

font-size:17px;

color:#333;

font-weight:600;

}

.info p{

font-size:13px;

color:#666;

margin-top:3px;

}

.full{

font-size:14px;

font-weight:600;

margin-top:2px;

}

.cake{

font-size:26px;

}

.loading{

text-align:center;

padding:40px;

color:#888;

}

</style>

</head>

<body>

<div class="widget">

<div class="header">

<div class="icon">🎁</div>

<div class="title">

Ulang Tahun Terdekat

</div>

</div>

<div id="list">

<div class="loading">

Memuat...

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyl8P9UMwPYhTihmQZawwQV0aTt-T-TLtLMk0uQIgfX9yHhc76vfiOXdJ6gHb0hgtmiWA/exec?type=birthday";

fetch(API)

.then(r=>r.json())

.then(data=>{

const list=document.getElementById("list");

list.innerHTML="";

data.forEach(item=>{

let status="";

if(item.diff==0){

status="Hari ini";

}else if(item.diff<=7){

status="Minggu depan";

}else if(item.diff<=14){

status="Dalam 2 minggu";

}else if(item.diff<=21){

status="Dalam 3 minggu";

}else{

status=item.diff+" hari lagi";

}

list.innerHTML+=`

<div class="card">

<div class="left">

<div class="date">

<div class="day">${item.tanggal}</div>

<div class="month">${item.bulan}</div>

</div>

<img class="avatar"

src="${item.foto}"

onerror="this.src='https://ui-avatars.com/api/?background=FFE0B2&color=E65100&name='+encodeURIComponent('${item.nama}')">

<div class="info">

<h3>${item.nama}</h3>

<p>${status}</p>

<div class="full">${item.full}</div>

</div>

</div>

<div class="cake">

🎂

</div>

</div>

`;

});

})

.catch(err=>{

document.getElementById("list").innerHTML=

"<div class='loading'>Tidak dapat mengambil data</div>";

console.error(err);

});

</script>

</body>
</html>
